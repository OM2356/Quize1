<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz App</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .quiz-container {
      background: #fff;
      padding: 30px;
      width: 90%;
      max-width: 550px;
      border-radius: 12px;
      box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    h1 {
      margin-bottom: 14px;
      color: #333;
    }

    #question {
      font-size: 20px;
      margin-bottom: 20px;
      font-weight: 600;
      color: #444;
    }

    #options {
      list-style: none;
      padding: 0;
    }

    #options li {
      background: #f5f5f5;
      margin: 12px 0;
      padding: 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    #options li:hover {
      background: #eef3ff;
      transform: scale(1.02);
      border: 2px solid #2575fc;
    }

    #options li.selected {
      background: #d9e9ff;
      border: 2px solid #2575fc;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2575fc;
      color: white;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    button:hover {
      background: #1a5fd1;
      transform: scale(1.05);
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    #score {
      margin-top: 20px;
      font-weight: bold;
      font-size: 18px;
      color: #333;
    }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      background: #eee;
      border-radius: 10px;
      margin-top: 20px;
      overflow: hidden;
      height: 12px;
    }
    .progress {
      height: 100%;
      background: linear-gradient(to right, #6a11cb, #2575fc);
      width: 0%;
      transition: width 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="quiz-container">
    <h1>🚀 Quiz Time!</h1>
    <div id="question">Question text</div>
    <ul id="options"></ul>
    <button id="submitBtn" onclick="submitAnswer()">Submit</button>
    <button id="nextBtn" onclick="nextQuestion()" style="display:none;">Next</button>
    <div id="result"></div>
    <div id="score">Score: 0</div>
    <div class="progress-bar"><div class="progress" id="progress"></div></div>
  </div>

  <script>
    const questions = [
      {
        question: "Who is the creator of the Python programming language?",
        options: ["James Gosling","Bjarne Stroustrup","Dennis Ritchie","Guido van Rossum"],
        answer: "Guido van Rossum"
      },
      {
        question: "Python language was created in which year?",
        options: ["1980","1989","1991","1995"],
        answer: "1989"
      },
      {
        question: "Which of the following languages is purely object-oriented?",
        options: ["Java", "C", "C++", "Python"],
        answer: "Java"
      },
      {
        question: "Which programming language is known as the mother of all languages?",
        options: ["Java", "C", "COBOL", "Assembly"],
        answer: "C"
      },
      {
        question: "Who is the creater of Java programming language?",
        options: ["Dennis Ritchie","James Gosling","Anders Hejlsberg","Tim Berners-Lee"],
        answer: "James Gosling"
      },
      {
        question:"In Python,which of the following is immutable?",
        options:["List","Dictionary","Tuple","Set"],
        answer:"Tuple"
      },
      {
        question:"Which data structure gives FIFO(First In First Out)order?",
        options:["Stack","Queue","Linked List","Tree"],
        answer:"Queue"
      },
      {
        question:"Which comes next in the series: 2,6,12,20,30,?",
        options:["36","42","46","50"],
        answer:"42" 
      },
      {
        question:"Which symbol is used for single-line comments in JavaScript?",
        options:["<!--","#","//","/* */"],
        answer:"//"
      },
      {
        question:"Which of the following is not a valid Python data type?",
        options:["List","Tuple","Array","Set"],
        answer:"Array"
      },
      {
        question:"Which tag is used to create a numbered list in HTML?",
        options:["<ul>","<ol>","<li>","<list>"],
        answer:"<ol>"  
      },
      {
        question:"C++ was developed as an extension of C with which main feature?",
        options:["Functions","Object-Oriented Programming","Memory Mangement","Assembly Support"],
        answer:"Object-Oriented Programming"
      },
      {
        question:"Who is called the Father of Computer Science?",
        options:["Alan Turing","Charles Babbage","John McCarthy","Dennis Ritchie"],
        answer:"Alan Turing"
      },
      {
        question:"What is the output of print (2**3**2)?",
        options:["64","512","256","729"],
        answer:"512"
      },
      {
        question:"Which Python library  is best suited for Machine Learing?",
        options:["Numpy","Pandas","Scikit-learn","Matplotlib"],
        answer:"Scikit-learn"
      },
      {
        question:"Which of the following is not a principle of OOP?",
        options:["Encapsulation","Inheritance","Polymorphism","Compilation"],
        answer:"Compilation"
      },
      {
        question:"Which of the following methods is the constructor in Python?",
        options:["_init_()","_str_()","_main_()","_new_()"],
        answer:"_init_()"
      },
      {
        question:"In Python ,multiple inheritance means:",
        options:["A class can inherit from only one parent class","A class can inherit from multiple parent classes","Two classes can inherit from each other","None of the above"],
        answer:"A class can inherit from multiple parent classes"
      }
    ];

    let currentIndex = 0;
    let score = 0;
    let selectedOption = null;

    function showQuestion() {
      const current = questions[currentIndex];
      document.getElementById("question").innerText = current.question;
      const optionsList = document.getElementById("options");
      optionsList.innerHTML = "";
      document.getElementById("result").innerText = "";
      selectedOption = null;

      current.options.forEach(option => {
        const li = document.createElement("li");
        li.innerText = option;
        li.onclick = function () {
          selectOption(this);
        };
        optionsList.appendChild(li);
      });

      document.getElementById("submitBtn").style.display = "inline-block";
      document.getElementById("nextBtn").style.display = "none";

      updateProgress();
    }

    function selectOption(option) {
      const options = document.querySelectorAll("#options li");
      options.forEach(o => o.classList.remove("selected"));
      option.classList.add("selected");
      selectedOption = option;
    }

    function submitAnswer() {
      if (!selectedOption) {
        alert("⚠️ Please select an option!");
        return;
      }

      const answer = questions[currentIndex].answer;
      if (selectedOption.innerText === answer) {
        score++;
        selectedOption.style.backgroundColor = "lightgreen";
        document.getElementById("result").innerText = "✅ Correct!";
        document.getElementById("result").style.color = "green";
      } else {
        selectedOption.style.backgroundColor = "salmon";
        document.getElementById("result").innerText = `❌ Wrong! Correct Answer: ${answer}`;
        document.getElementById("result").style.color = "red";
      }
      document.getElementById("score").innerText = `Score: ${score}`;
      document.getElementById("submitBtn").style.display = "none";
      document.getElementById("nextBtn").style.display = "inline-block";
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex < questions.length) {
        showQuestion();
      } else {
        document.getElementById("question").innerText = "🎉 Quiz Completed!";
        document.getElementById("options").innerHTML = "";
        document.getElementById("submitBtn").style.display = "none";
        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("result").innerText = `Final Score: ${score}/${questions.length}`;
        document.getElementById("result").style.color = "blue";
        document.getElementById("progress").style.width = "100%";
      }
    }

    function updateProgress() {
      const progress = document.getElementById("progress");
      progress.style.width = ((currentIndex) / questions.length) * 10 + "%";
    }

    // Initialize
    showQuestion();
  </script>
</body>
</html>
